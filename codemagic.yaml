workflows:
  default-workflow:
    name: Default Workflow

    environment:
      flutter: 3.27.2
      vars:
        GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"

    scripts:
      - flutter --version
      - flutter clean
      - flutter pub get
      - flutter gen-l10n
      - flutter build apk --release
