name: webinar
description: webinar project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 2.1.0+3

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


  flutter_localizations:
    sdk: flutter

  intl: any

  cupertino_icons: ^1.0.2
  flutter_svg: ^2.1.0
  provider: ^6.1.1
  dio: ^5.2.1+1
  persian_number_utility: ^1.1.3
  file_picker: ^8.0.7
  shared_preferences: ^2.1.2
  flutter_native_splash: ^2.3.1
  loading_indicator: ^3.1.0
  get_it: ^7.6.0
  flutter_advanced_drawer: ^1.3.5
  flutter_rating_bar: ^4.0.1
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.0.0
  url_launcher: ^6.1.12
  add_2_calendar: any
  http: ^1.1.2
  flutter_widget_from_html: ^0.15.0
  video_player: ^2.8.6
  share_plus: ^10.1.4
  chewie: ^1.7.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.0
  open_file: any
  flutter_image_compress: ^2.0.4
  image_picker: ^1.1.2
  flutter_slidable: ^3.0.0
  webview_flutter: ^4.4.2
  pod_player: ^0.2.2
  flutter_tts: any
  table_calendar: ^3.0.9
  confetti: ^0.7.0
  animated_flip_counter: ^0.3.4
  fl_chart: ^0.68.0
  syncfusion_flutter_pdfviewer: ^29.1.37
  timezone: ^0.9.2
  flutter_inappwebview: ^6.1.5
  lottie: ^3.0.0
  shimmer: ^3.0.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.2
  cached_network_image: ^3.3.1
  youtube_player_iframe: ^5.1.3
  app_links: ^6.3.3
  youtube_player_embed: ^1.6.4

  # ✅ Added to fix: CountryCode type not found
  country_code_picker: ^3.0.0

dependency_overrides: {}
  # flutter_widget_from_html_core: ^0.14.9
  # # wakelock: 0.6.2
  # win32: ^5.0.2
  # webview_flutter_android: 3.16.1
  # flutter_inappwebview_android:
  #   git:
  #     url: https://github.com/holzgeist/flutter_inappwebview
  #     path: flutter_inappwebview_android
  #     ref: d89b1d32638b49dfc58c4b7c84153be0c269d057

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

  # ✅ ADD: launcher icons generator (creates mipmap/ic_launcher correctly)
  flutter_launcher_icons: ^0.13.1

# ✅ ADD: flutter_launcher_icons config
# Put your PNG icon here (must be a real PNG file):
# assets/icon/icon.png
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/icon.png

flutter_native_splash:
  android: true
  ios: true
  web: false
  color: "#00BA63"
  color_dark: "#00BA63"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/image/flags/
    - assets/image/png/
    - assets/image/svg/
    - assets/image/json/
    - assets/icon/

  fonts:
    - family: SF-Pro-Bold
      fonts:
        - asset: assets/font/sf-pro-bold.otf
    - family: SF-Pro-Regular
      fonts:
        - asset: assets/font/sf-pro-regular.otf

    - family: Vazir-Bold
      fonts:
        - asset: assets/font/vazir-bold.ttf
    - family: Vazir-Regular
      fonts:
        - asset: assets/font/vazir-regular.ttf
